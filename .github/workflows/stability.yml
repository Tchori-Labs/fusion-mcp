# This workflow is a non-required flake-detection lane. It must never be added
# to branch protection, and neither its workflow nor job may be renamed to
# "Build & Test".
name: Stability

on:
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * *"

concurrency:
  group: stability
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  stability:
    name: Vitest stability burn-in
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest stability burn-in
        run: pnpm test:stability

      - name: Upload stability results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stability-json-results
          path: stability-results/*.json
          if-no-files-found: ignore
          retention-days: 5
