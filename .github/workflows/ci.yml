# The job below is named "Build & Test" and is the required status check in
# branch protection for `main`. Renaming the job (or this workflow's job id)
# silently breaks branch protection — the required check would never report.
# If you must rename it, update the branch-protection rule in the same change.
name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Knip (dead code / unused deps)
        run: pnpm knip

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Package checks (publint + pack smoke)
        run: pnpm pkgcheck

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Semgrep scan
        run: semgrep scan --error --config p/typescript --config p/security-audit

  secrets-scan:
    name: TruffleHog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown
