# Governed npm publish. Manual-only: a human dispatches this with the tag to
# release. The job checks out that exact tag, refuses to publish unless the
# tag's commit is on `main`, re-runs all five release gates, verifies the
# package version equals the tag, and publishes via npm Trusted Publishing
# (OIDC) — no long-lived npm token secret. The first publish of a new package
# name cannot use OIDC and must be done locally; see docs/release.md.
name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.0). Must already exist and point at a commit on main."
        required: true
        type: string

concurrency:
  group: publish-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # Required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Attach required-reviewer protection to this environment in the repository
    # settings so a human must approve every npm publish (see docs/release.md).
    environment: npm-publish
    timeout-minutes: 15
    steps:
      - name: Validate tag input
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'; then
            echo "::error::Tag '$TAG' is not a valid vX.Y.Z release tag."
            exit 1
          fi

      - name: Checkout tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag commit is on main
        env:
          TAG: ${{ inputs.tag }}
        run: |
          git fetch --no-tags origin main
          TAG_SHA="$(git rev-parse "refs/tags/${TAG}^{commit}")"
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            echo "::error::Tag ${TAG} (${TAG_SHA}) is not an ancestor of main. Only releases merged to main may be published."
            exit 1
          fi
          echo "OK: ${TAG} (${TAG_SHA}) is on main."

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          # No dependency caching here on purpose: a release build that mints
          # provenance must not restore artifacts cached from other refs.

      - name: Upgrade npm for Trusted Publishing
        # Trusted Publishing (OIDC) requires npm CLI >= 11.5.1; Node 22 ships
        # npm 10.x, so upgrade the globally installed npm before publishing.
        run: npm install --global npm@^11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Contract check
        run: pnpm contract:check

      - name: Verify package version matches tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "v${PKG_VERSION}" != "${TAG}" ]; then
            echo "::error::package.json version v${PKG_VERSION} does not match tag ${TAG}."
            exit 1
          fi
          echo "OK: package.json version v${PKG_VERSION} matches ${TAG}."

      - name: Publish to npm
        # Trusted Publishing generates provenance automatically; no
        # --provenance flag or token secret is needed.
        run: npm publish --access public
