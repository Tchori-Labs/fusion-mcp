version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    target-branch: develop
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    target-branch: develop
    open-pull-requests-limit: 3
    commit-message:
      prefix: ci
